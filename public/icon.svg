<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="#2563eb"/>

  <!-- Register screen -->
  <rect x="16" y="18" width="66" height="28" rx="4" fill="white"/>
  <rect x="20" y="22" width="58" height="20" rx="2" fill="#1e40af"/>
  <rect x="24" y="28" width="26" height="3" rx="1.5" fill="#60a5fa"/>
  <rect x="24" y="33" width="16" height="3" rx="1.5" fill="#3b82f6"/>

  <!-- Register body -->
  <rect x="12" y="44" width="80" height="60" rx="5" fill="white"/>

  <!-- Button rows -->
  <rect x="18" y="52" width="11" height="8" rx="2" fill="#bfdbfe"/>
  <rect x="33" y="52" width="11" height="8" rx="2" fill="#bfdbfe"/>
  <rect x="48" y="52" width="11" height="8" rx="2" fill="#bfdbfe"/>
  <rect x="63" y="52" width="11" height="8" rx="2" fill="#bfdbfe"/>

  <rect x="18" y="64" width="11" height="8" rx="2" fill="#93c5fd"/>
  <rect x="33" y="64" width="11" height="8" rx="2" fill="#93c5fd"/>
  <rect x="48" y="64" width="11" height="8" rx="2" fill="#93c5fd"/>
  <rect x="63" y="64" width="11" height="8" rx="2" fill="#93c5fd"/>

  <!-- Drawer divider -->
  <rect x="12" y="80" width="80" height="2" fill="#bfdbfe"/>
  <!-- Drawer handle -->
  <rect x="38" y="86" width="28" height="7" rx="3.5" fill="#93c5fd"/>

  <!-- Wrench badge (bottom-right corner) -->
  <circle cx="99" cy="99" r="26" fill="#ea580c"/>
  <!-- Wrench: open-end spanner rotated -45deg -->
  <g transform="translate(99,99) rotate(-45)">
    <!-- Handle -->
    <rect x="-4" y="-4" width="8" height="24" rx="4" fill="white"/>
    <!-- Head outer -->
    <rect x="-11" y="-18" width="22" height="16" rx="4" fill="white"/>
    <!-- Head gap (jaw opening) -->
    <rect x="-5.5" y="-20" width="11" height="11" rx="2" fill="#ea580c"/>
  </g>
</svg>
